<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #1a1a2f;
        }
        .dashboard {
            display: flex;
            min-height: 100vh;
        }
        .sidebar {
            width: 280px;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
            color: white;
            padding: 2rem 1rem;
            box-shadow: 4px 0 20px rgba(0, 0, 0, 0.08);
        }
        .sidebar h3 {
            font-size: 1.8rem;
            margin-bottom: 2rem;
            text-align: center;
            border-bottom: 2px solid #3b82f6;
            padding-bottom: 0.75rem;
        }
        .sidebar button {
            width: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            color: white;
            padding: 0.85rem 1rem;
            margin: 0.5rem 0;
            border-radius: 12px;
            font-size: 1rem;
            text-align: left;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sidebar button:hover {
            background: #3b82f6;
            transform: translateX(6px);
        }
        .main {
            flex: 1;
            padding: 2rem;
            overflow-y: auto;
        }
        .card {
            background: white;
            border-radius: 24px;
            padding: 1.8rem;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.05);
            margin-bottom: 1.5rem;
        }
        .card h3 {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            color: #0f172a;
            border-left: 5px solid #3b82f6;
            padding-left: 1rem;
        }
        input, select, button {
            width: 100%;
            padding: 0.8rem 1rem;
            margin: 0.6rem 0;
            border: 1px solid #e2e8f0;
            border-radius: 14px;
            font-size: 0.95rem;
        }
        button {
            background: #3b82f6;
            color: white;
            border: none;
            cursor: pointer;
        }
        button:hover {
            background: #2563eb;
        }
        .data-table {
            width: 100%;
            border-collapse: collapse;
            background: white;
            border-radius: 20px;
            overflow: hidden;
        }
        .data-table th {
            background: #f1f5f9;
            padding: 12px 10px;
            text-align: left;
            font-weight: 600;
        }
        .data-table td {
            padding: 10px;
            border-bottom: 1px solid #eef2ff;
        }
        .message {
            padding: 1rem;
            border-radius: 16px;
            background: #eef2ff;
            color: #1e40af;
        }
        .grid {
            display: grid;
            grid-template-columns: 1fr 1.2fr;
            gap: 2rem;
        }
        @media (max-width: 900px) {
            .dashboard { flex-direction: column; }
            .sidebar { width: 100%; display: flex; flex-wrap: wrap; gap: 0.5rem; }
            .sidebar button { width: auto; flex: 1; text-align: center; justify-content: center; }
            .grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="dashboard">
    <div class="sidebar">
        <h3>⚙️ Admin Panel</h3>
        <button onclick="showSection('createCourse')">📘 Create Course</button>
        <button onclick="showSection('assignTeacher')">👨‍🏫 Assign Teacher</button>
        <button onclick="showSection('enrollStudent')">📝 Enroll Student</button>
        <button onclick="showSection('assignParent')">👪 Assign Parent</button>
        <button onclick="getStudents()">📋 View Students</button>
        <button onclick="getTeachers()">👩‍🏫 View Teachers</button>
        <button onclick="getCourses()">📚 View Courses</button>
        <button onclick="getUsers()">👥 List All Users</button>
        <button onclick="showSection('createUser')">➕ Create User</button>
        <button onclick="logout()">🚪 Logout</button>
    </div>

    <div class="main">
        <div class="grid">
            <!-- LEFT: FORMS -->
            <div>
                <div id="createCourse" class="card">
                    <h3>➕ Create Course</h3>
                    <input id="course_name" placeholder="Course Name">
                    <button onclick="createCourse()">Create</button>
                </div>
                <div id="assignTeacher" class="card" style="display:none;">
                    <h3>👨‍🏫 Assign Teacher</h3>
                    <input id="teacher_id" placeholder="Teacher ID">
                    <input id="course_id" placeholder="Course ID">
                    <button onclick="assignTeacher()">Assign</button>
                </div>
                <div id="enrollStudent" class="card" style="display:none;">
                    <h3>📝 Enroll Student</h3>
                    <input id="student_id" placeholder="Student ID">
                    <input id="course_id2" placeholder="Course ID">
                    <button onclick="enrollStudent()">Enroll</button>
                </div>
                <div id="assignParent" class="card" style="display:none;">
                    <h3>👪 Assign Parent</h3>
                    <input id="student_id_p" placeholder="Student ID">
                    <input id="parent_id" placeholder="Parent ID">
                    <button onclick="assignParent()">Assign</button>
                </div>
                <!-- NEW: Create User Form -->
                <div id="createUser" class="card" style="display:none;">
                    <h3>➕ Create New User</h3>
                    <input id="new_name" placeholder="Full Name">
                    <input id="new_email" placeholder="Email Address">
                    <input id="new_password" placeholder="Temporary Password">
                    <select id="new_role">
                        <option value="student">Student</option>
                        <option value="teacher">Teacher</option>
                        <option value="parent">Parent</option>
                        <option value="admin">Admin</option>
                    </select>
                    <button onclick="createUser()">Create User</button>
                </div>
            </div>

            <!-- RIGHT: DATA OUTPUT -->
            <div class="card">
                <h3>📊 Data</h3>
                <div id="output">
                    <p class="message">✨ Click any view button (Students, Teachers, Courses, Users) to see records.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="js/admin.js"></script>
</body>
</html>
